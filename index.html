<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐍 Snake Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🐍 Snake Game</h1>

    <div class="scoreboard">
      <span>Score: <strong id="score">0</strong></span>
      <span>High Score: <strong id="high-score">0</strong></span>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
      <button id="startBtn">▶ Start</button>
      <button id="pauseBtn" disabled>⏸ Pause</button>
      <button id="restartBtn" disabled>🔄 Restart</button>
    </div>

    <div class="arrow-keys">
      <button class="arrow-btn" id="btn-up">▲</button>
      <div class="arrow-row">
        <button class="arrow-btn" id="btn-left">◀</button>
        <button class="arrow-btn" id="btn-down">▼</button>
        <button class="arrow-btn" id="btn-right">▶</button>
      </div>
    </div>

    <p class="hint">Use arrow keys or the buttons above to control the snake.</p>
  </div>

  <script src="game.js"></script>
</body>
</html>
